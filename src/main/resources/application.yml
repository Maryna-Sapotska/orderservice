spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/orderservice}
    username: ${SPRING_DATASOURCE_USERNAME:orderservice}
    password: ${SPRING_DATASOURCE_PASSWORD:orderservice}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    clear-check-sums: true

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}

jwt:
  secret: bXktc3VwZXItc2VjcmV0LWtleS1teS1zdXBlci1zZWNyZXQta2V5LTEyMzQ=

server:
  port: 8082

logging:
  level:
    root: INFO
    org.springframework: INFO